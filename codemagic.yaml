workflows:
  moodle-android:
    name: Moodle Android Build
    max_build_duration: 120
    environment:
      android_signing:
        - dvdedukacija
      node: 24.16.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Install cordova plugin deps
        script: cd cordova-plugin-moodleapp && npm install && npm run prod && cd ..
      - name: Build web assets
        script: npm run build:prod
      - name: Cordova build Android
        script: |
          npx cordova platform add android || true
          npx cordova build android --release -- \
            --keystore=$CM_KEYSTORE_PATH \
            --storePassword=$CM_KEYSTORE_PASSWORD \
            --alias=$CM_KEY_ALIAS \
            --password=$CM_KEY_PASSWORD
      - name: Fix content providers and rebuild
        script: |
          find platforms/android -name "*.xml" -exec sed -i '' 's/com\.moodle\.moodlemobile/com.helpdesk.moodledvdkragujevac/g' {} \;
          find platforms/android -name "*.java" -exec sed -i '' 's/com\.moodle\.moodlemobile/com.helpdesk.moodledvdkragujevac/g' {} \;
          cd platforms/android
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$CM_KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$CM_KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$CM_KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$CM_KEY_PASSWORD
    artifacts:
      - platforms/android/app/build/outputs/bundle/release/*.aab
      - platforms/android/app/build/outputs/apk/release/*.apk
