workflows:
  moodle-android:
    name: Moodle Android Build
    max_build_duration: 120
    environment:
      android_signing:
        - dvdedukacija
      node: 24.16.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Install cordova plugin deps
        script: cd cordova-plugin-moodleapp && npm install && npm run prod && cd ..
      - name: Build web assets
        script: npm run build:prod
      - name: Cordova prepare Android
        script: |
          npx cordova platform add android || true
          npx cordova prepare android
      - name: Build Android
        script: |
          cd platforms/android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - platforms/android/app/build/outputs/bundle/release/*.aab
      - platforms/android/app/build/outputs/apk/release/*.apk
