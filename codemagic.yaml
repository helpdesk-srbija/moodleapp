workflows:
  moodle-android:
    name: Moodle Android Build
    max_build_duration: 60
    environment:
      android_signing:
        - dvdedukacija
      node: 18.17.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npx ionic build --prod
      - name: Capacitor sync
        script: npx cap sync android
      - name: Build Android
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
