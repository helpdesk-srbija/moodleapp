workflows:
  moodle-android:
    name: Moodle Android Build
    max_build_duration: 60
    environment:
      android_signing:
        - dvdedukacija
      node: 24.16.0
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Build web
        script: npx ionic build --prod
      - name: Capacitor sync
        script: ./node_modules/.bin/cap sync android
      - name: Build Android
        script: |
          cd android
          ./gradlew bundleRelease
    artifacts:
      - android/app/build/outputs/bundle/release/*.aab
